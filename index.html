<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - PS Store Online</title>
    <style>
        /* Variables de secours pour éviter l'écran blanc si style.css ne charge pas */
        :root {
            --primary-orange: #ff8c00;
            --radius: 25px;
        }

        body { 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }

        .auth-container { 
            background: white; 
            padding: 40px; 
            border-radius: var(--radius); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }

        h1 { color: #333; margin-bottom: 20px; }

        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: var(--radius); 
            box-sizing: border-box; 
        }

        .btn { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, var(--primary-orange) 0%, #fff9f2 100%); 
            border: 1px solid var(--primary-orange); 
            border-radius: var(--radius); 
            cursor: pointer; 
            font-weight: bold; 
        }

        #switch-mode { color: var(--primary-orange); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <h1 id="form-title">Créer un compte</h1>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Mot de passe" required>
        <button id="btn-action" class="btn">S'inscrire</button>
        <p style="margin-top:20px; font-size:14px;">
            <span id="toggle-text">Déjà un compte ?</span> <span id="switch-mode">Se connecter</span>
        </p>
    </div>

    <!-- SCRIPTS FIREBASE COMPAT (SANS IMPORT) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBs3sU5DJvYmyEfzz4gSLZeamCyBDDx4bg",
            authDomain: "ps-store-online.firebaseapp.com",
            projectId: "ps-store-online",
            storageBucket: "ps-store-online.firebasestorage.app",
            messagingSenderId: "102104750653",
            appId: "1:102104750653:web:33610ac358ad77e7322854"
        };

        // Initialisation sécurisée
        try {
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const btnAction = document.getElementById('btn-action');
            const switchMode = document.getElementById('switch-mode');
            const formTitle = document.getElementById('form-title');

            let isRegisterMode = true;

            switchMode.onclick = () => {
                isRegisterMode = !isRegisterMode;
                formTitle.innerText = isRegisterMode ? "Créer un compte" : "Se connecter";
                btnAction.innerText = isRegisterMode ? "S'inscrire" : "Se connecter";
                document.getElementById('toggle-text').innerText = isRegisterMode ? "Déjà un compte ?" : "Pas de compte ?";
                switchMode.innerText = isRegisterMode ? "Se connecter" : "S'inscrire";
            };

            btnAction.onclick = async () => {
                const email = emailInput.value;
                const password = passwordInput.value;

                if(!email || !password) {
                    alert("Remplis les champs !");
                    return;
                }

                try {
                    if (isRegisterMode) {
                        await auth.createUserWithEmailAndPassword(email, password);
                        alert("Compte créé ! Redirection...");
                    } else {
                        await auth.signInWithEmailAndPassword(email, password);
                        alert("Connecté ! Redirection...");
                    }
                    window.location.href = "accueil.html";
                } catch (e) {
                    alert("Erreur : " + e.message);
                }
            };
        } catch (err) {
            console.error("Firebase ne charge pas :", err);
        }
    </script>
</body>
</html>
