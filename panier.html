<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Panier - PS Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com"></script>
    <style>
        .cart-page { padding: 40px 5%; max-width: 800px; margin: auto; animation: fadeIn 0.8s ease-out; }
        
        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            background: white; padding: 20px; border-radius: var(--radius);
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .item-info h3 { margin: 0; font-size: 16px; }
        .item-info p { color: var(--primary-orange); font-weight: bold; margin: 5px 0 0; }

        .btn-remove {
            background: #fff1f1; border: 1px solid #ff4d4d; color: #ff4d4d;
            padding: 8px 15px; border-radius: var(--radius); cursor: pointer;
            font-size: 12px; transition: 0.3s;
        }
        .btn-remove:hover { background: #ff4d4d; color: white; }

        .cart-summary {
            margin-top: 30px; padding: 25px; background: #fff;
            border-radius: var(--radius); text-align: center;
            border: 2px solid #eee;
        }

        .total-price { font-size: 24px; font-weight: 800; margin-bottom: 20px; }

        .btn-order {
            width: 100%; font-size: 18px; padding: 15px;
            background: linear-gradient(135deg, #25d366 0%, #fff 150%); /* Dégradé vert WhatsApp */
            border-color: #25d366; color: #075e54;
        }
        
        .empty-msg { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body style="background-color: var(--white);">

    <div class="cart-page">
        <button class="btn" onclick="window.location.href='accueil.html'" style="margin-bottom: 20px;">
            <i data-lucide="arrow-left" style="width:16px;"></i> Retour à la boutique
        </button>

        <h1>Votre Panier</h1>

        <div id="cart-list">
            <!-- Les articles s'afficheront ici -->
        </div>

        <div id="summary-container" style="display:none;">
            <div class="cart-summary">
                <div class="total-price">Total: <span id="total-amount">0</span> GNF</div>
                <button class="btn btn-order" onclick="passerCommande()">
                    <i data-lucide="message-circle"></i> Commander sur WhatsApp
                </button>
            </div>
        </div>

        <div id="empty-cart" class="empty-msg">
            <i data-lucide="shopping-bag" style="width: 50px; height: 50px; margin-bottom: 15px;"></i>
            <p>Votre panier est vide.</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Récupérer le panier depuis le stockage du navigateur
        let panier = JSON.parse(localStorage.getItem('panier')) || [];

        function renderCart() {
            const list = document.getElementById('cart-list');
            const summary = document.getElementById('summary-container');
            const empty = document.getElementById('empty-cart');
            let total = 0;

            list.innerHTML = "";

            if (panier.length > 0) {
                summary.style.display = "block";
                empty.style.display = "none";

                panier.forEach((item, index) => {
                    // Nettoyer le prix pour le calcul (ex: "25.000 GNF" -> 25000)
                    let prixNumerique = parseInt(item.price.replace(/[^0-9]/g, ''));
                    total += prixNumerique;

                    list.innerHTML += `
                        <div class="cart-item">
                            <div class="item-info">
                                <h3>${item.name}</h3>
                                <p>${item.price}</p>
                            </div>
                            <button class="btn-remove" onclick="retirerDuPanier(${index})">
                                <i data-lucide="trash-2" style="width:14px;"></i> Retirer
                            </button>
                        </div>
                    `;
                });

                document.getElementById('total-amount').innerText = total.toLocaleString();
            } else {
                summary.style.display = "none";
                empty.style.display = "block";
            }
            lucide.createIcons();
        }

        function retirerDuPanier(index) {
            panier.splice(index, 1); // Supprimer l'élément
            localStorage.setItem('panier', JSON.stringify(panier)); // Sauvegarder
            renderCart(); // Rafraîchir l'affichage
        }

        function passerCommande() {
            const numeroWhatsApp = "22871610313X"; // REMPLACE PAR TON NUMÉRO (ex: 224621000000)
            
            let message = "Bonjour PS Store, je souhaite commander :%0A%0A";
            let total = document.getElementById('total-amount').innerText;

            panier.forEach((item, i) => {
                message += `${i + 1}. *${item.name}* - ${item.price}%0A`;
            });

            message += `%0A*Total à payer : ${total} GNF*`;
            message += `%0A%0AMerci de confirmer ma commande !`;

            // Lien WhatsApp magique
            window.open(`https://wa.me{numeroWhatsApp}?text=${message}`, '_blank');
        }

        renderCart();
    </script>
</body>
</html>
